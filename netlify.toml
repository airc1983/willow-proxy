# ══════════════════════════════════════════════════════════════
# Willow — Netlify Config
# ══════════════════════════════════════════════════════════════

[build]
  functions = "netlify/functions"
  publish = "public"

# Rewrite /api/places and /api/details to the serverless function
[[redirects]]
  from = "/api/places"
  to = "/.netlify/functions/places"
  status = 200

[[redirects]]
  from = "/api/details"
  to = "/.netlify/functions/places"
  status = 200

# CORS headers for all API routes
[[headers]]
  for = "/api/*"
  [headers.values]
    Access-Control-Allow-Origin = "*"
    Access-Control-Allow-Methods = "GET, OPTIONS"
    Access-Control-Allow-Headers = "Content-Type"
